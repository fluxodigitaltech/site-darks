server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache para assets estáticos com hash no nome (gerados pelo Vite)
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy reverso para a API EVO (substitui o rewrite do vercel.json)
    location /api-evo/ {
        resolver 1.1.1.1 8.8.8.8 valid=30s;
        set $upstream https://evo-integracao-api.w12app.com.br;

        proxy_pass $upstream/;
        proxy_ssl_server_name on;
        proxy_set_header Host evo-integracao-api.w12app.com.br;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # SPA fallback — todas as rotas retornam o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
