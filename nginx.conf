server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;
    gzip_min_length 1024;

    # Cache para assets estáticos com hash no nome (gerados pelo Vite)
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Cache curto para HTML (permite atualizar a SPA sem cache busting forte)
    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files /index.html =404;
    }

    # Proxy reverso para a API EVO
    location /api-evo/ {
        # Resolver DNS dinâmico (necessário pra Cloudflare-backed APIs)
        resolver 1.1.1.1 8.8.8.8 valid=30s ipv6=off;
        resolver_timeout 5s;

        # proxy_pass com URL literal (mais confiável que variável)
        proxy_pass https://evo-integracao-api.w12app.com.br/;

        # SSL para o upstream
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_verify off;

        # Versão HTTP do proxy
        proxy_http_version 1.1;

        # Headers explícitos pra garantir que tudo é repassado corretamente
        proxy_set_header Host evo-integracao-api.w12app.com.br;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Accept $http_accept;
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Não passar Origin nem cookies (a API não precisa, e isso evita bloqueios CORS desnecessários)
        proxy_set_header Origin "";
        proxy_set_header Cookie "";

        # Timeouts mais generosos
        proxy_connect_timeout 15s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffers
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;

        # Repassa o status code original sem reescrita
        proxy_intercept_errors off;
    }

    # SPA fallback — todas as rotas retornam o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
